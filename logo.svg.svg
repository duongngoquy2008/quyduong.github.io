<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Màu gradient Tech -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    
    <!-- Hiệu ứng phát sáng nhẹ cho các Node -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Lục giác (Toán học / Hình học) -->
  <polygon points="60,10 103,35 103,85 60,110 17,85 17,35" fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Chữ D cách điệu (Dương) -->
  <path d="M 42 35 L 42 85 L 55 85 C 75 85 85 75 85 60 C 85 45 75 35 55 35 Z" fill="none" stroke="url(#logoGrad)" stroke-width="7" stroke-linejoin="round" />
  
  <!-- Điểm nhấn Data Science (Mạng lưới) -->
  <circle cx="85" cy="60" r="5" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="42" cy="35" r="4.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="42" cy="85" r="4.5" fill="#6366f1" filter="url(#glow)"/>
</svg>
